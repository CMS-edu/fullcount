<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>풀카운트</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="site-header">
        <a class="brand" href="/" aria-label="풀카운트 홈">
          <span class="brand-mark">FC</span>
          <span>
            <strong>풀카운트</strong>
            <small>온라인 야구 시뮬레이션</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="주요 메뉴">
          <button class="nav-button selected" data-app-view="game">게임하기</button>
          <button class="nav-button" data-app-view="online">실시간 대전</button>
          <button class="nav-button" data-app-view="records">기록</button>
          <button class="nav-button" data-app-view="settings">설정</button>
          <button class="nav-button primary" data-app-view="account">계정</button>
        </nav>
      </header>
      <section id="authPanel" class="auth-panel" aria-live="polite"></section>
      <section class="game-shell">
        <canvas id="gameCanvas" width="960" height="540" aria-label="풀카운트 야구 경기 화면"></canvas>
        <div id="uiLayer" class="ui-layer"></div>
      </section>
      <section id="actionBar" class="action-bar" aria-live="polite"></section>
    </main>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="main.js"></script>
  </body>
</html>
